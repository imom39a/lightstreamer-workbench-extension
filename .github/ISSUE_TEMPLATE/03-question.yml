name: Usage question
description: Ask a question about using or contributing to Lightstreamer Event Workbench.
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or accomplish?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include extension version, Chrome version, Lightstreamer Web Client version, and the workflow you are debugging if relevant.
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Link docs, issues, commands, screenshots, or sanitized payload examples that may help.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have redacted secrets, credentials, production-only payloads, customer data, and private URLs.
          required: true
