<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-label="Lightstreamer Event Workbench marquee promo tile">
  <defs>
    <linearGradient id="marquee-overlay" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f" stop-opacity="0.98"/>
      <stop offset="0.42" stop-color="#09111f" stop-opacity="0.9"/>
      <stop offset="0.72" stop-color="#09111f" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#09111f" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="marquee-logo-shadow" x="58" y="58" width="148" height="148" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <image href="../../docs/assets/brand-hero-ai.png" x="0" y="0" width="1400" height="560" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1400" height="560" fill="url(#marquee-overlay)"/>
  <image href="../icons/icon-128.png" x="82" y="82" width="104" height="104" filter="url(#marquee-logo-shadow)"/>
  <text x="82" y="258" fill="#f8fafc" font-family="Inter, Arial, Helvetica, sans-serif" font-size="62" font-weight="800">Lightstreamer</text>
  <text x="82" y="330" fill="#f8fafc" font-family="Inter, Arial, Helvetica, sans-serif" font-size="62" font-weight="800">Event Workbench</text>
  <text x="86" y="394" fill="#d8dee9" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30">Inspect COMMAND streams, changed fields,</text>
  <text x="86" y="436" fill="#d8dee9" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30">snapshots, and local synthetic replay.</text>
  <rect x="86" y="482" width="158" height="42" rx="8" fill="#2563eb"/>
  <text x="121" y="510" fill="#eff6ff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="800">ADD keys</text>
  <rect x="266" y="482" width="196" height="42" rx="8" fill="#0f766e"/>
  <text x="301" y="510" fill="#ecfeff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="800">UPDATE state</text>
  <rect x="484" y="482" width="194" height="42" rx="8" fill="#334155"/>
  <text x="520" y="510" fill="#f8fafc" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Replay locally</text>
</svg>
